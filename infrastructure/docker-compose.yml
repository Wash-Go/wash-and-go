name: wash-and-go

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wash_and_go
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      # Host 5433 to avoid clashing with a native Postgres on 5432.
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d wash_and_go"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Host 6380 to avoid clashing with a native Redis on 6379.
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
